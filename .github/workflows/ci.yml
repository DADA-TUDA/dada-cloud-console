name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build and verify release path
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Backend tests
        working-directory: backend
        run: go test ./... -count=1

      - name: Backend build
        working-directory: backend
        run: go build -buildvcs=false -ldflags="-s -w" -o bin/server ./cmd/server

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Helm lint
        run: helm lint helm/dada-cloud-console

      - name: Helm render
        run: |
          helm template dada-cloud-console helm/dada-cloud-console \
            --namespace devops-tools \
            --set backend.image.tag="${GITHUB_SHA::8}" \
            --set frontend.image.tag="${GITHUB_SHA::8}" \
            > /tmp/dada-cloud-console-rendered.yaml

      - name: Docker build backend image
        run: docker build -t dada-cloud-console-backend:${GITHUB_SHA::8} -f backend/Dockerfile backend

      - name: Docker build frontend image
        run: docker build -t dada-cloud-console-frontend:${GITHUB_SHA::8} -f frontend/Dockerfile frontend

      - name: Docker build gitops-agent image
        run: docker build -t dada-cloud-console-gitops-agent:${GITHUB_SHA::8} -f gitops-agent/Dockerfile gitops-agent

      - name: Docker login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker push images
        if: github.event_name != 'pull_request'
        run: |
          docker tag dada-cloud-console-backend:${GITHUB_SHA::8} ghcr.io/dadadevelopment/dada-cloud-console-backend:${GITHUB_SHA::8}
          docker tag dada-cloud-console-frontend:${GITHUB_SHA::8} ghcr.io/dadadevelopment/dada-cloud-console-frontend:${GITHUB_SHA::8}
          docker tag dada-cloud-console-gitops-agent:${GITHUB_SHA::8} ghcr.io/dadadevelopment/dada-cloud-console-gitops-agent:${GITHUB_SHA::8}
          docker push ghcr.io/dadadevelopment/dada-cloud-console-backend:${GITHUB_SHA::8}
          docker push ghcr.io/dadadevelopment/dada-cloud-console-frontend:${GITHUB_SHA::8}
          docker push ghcr.io/dadadevelopment/dada-cloud-console-gitops-agent:${GITHUB_SHA::8}
          docker tag ghcr.io/dadadevelopment/dada-cloud-console-backend:${GITHUB_SHA::8} ghcr.io/dadadevelopment/dada-cloud-console-backend:latest
          docker tag ghcr.io/dadadevelopment/dada-cloud-console-frontend:${GITHUB_SHA::8} ghcr.io/dadadevelopment/dada-cloud-console-frontend:latest
          docker tag ghcr.io/dadadevelopment/dada-cloud-console-gitops-agent:${GITHUB_SHA::8} ghcr.io/dadadevelopment/dada-cloud-console-gitops-agent:latest
          docker push ghcr.io/dadadevelopment/dada-cloud-console-backend:latest
          docker push ghcr.io/dadadevelopment/dada-cloud-console-frontend:latest
          docker push ghcr.io/dadadevelopment/dada-cloud-console-gitops-agent:latest

      - name: Upload backend binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-server-${{ github.sha }}
          path: backend/bin/server
          if-no-files-found: error

      - name: Upload frontend standalone app
        uses: actions/upload-artifact@v4
        with:
          name: frontend-standalone-${{ github.sha }}
          path: |
            frontend/.next/standalone
            frontend/.next/static
          if-no-files-found: error
