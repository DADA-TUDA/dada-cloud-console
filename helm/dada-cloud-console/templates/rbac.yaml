{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dada-cloud-console.fullname" . }}-status-reader
  labels:
    {{- include "dada-cloud-console.labels" . | nindent 4 }}
rules:
  - apiGroups: ["platform.dada-tuda.ru"]
    resources:
      - apps
      - servicedatabases
      - serviceendpoints
      - servicebackups
      - servicerestores
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources:
      - applications
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - events
      - namespaces
    verbs: ["get", "list", "watch"]
  {{- with .Values.rbac.extraRules }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "dada-cloud-console.fullname" . }}-status-reader
  labels:
    {{- include "dada-cloud-console.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "dada-cloud-console.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "dada-cloud-console.fullname" . }}-status-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
