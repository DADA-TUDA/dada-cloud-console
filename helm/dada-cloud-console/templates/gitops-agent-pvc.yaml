{{- if and .Values.gitopsAgent.enabled .Values.gitopsAgent.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "dada-cloud-console.fullname" . }}-gitops-repos
  labels:
    {{- include "dada-cloud-console.labels" . | nindent 4 }}
    app.kubernetes.io/component: gitops-agent
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.gitopsAgent.persistence.storageClassName }}
  storageClassName: {{ .Values.gitopsAgent.persistence.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.gitopsAgent.persistence.size }}
{{- end }}
