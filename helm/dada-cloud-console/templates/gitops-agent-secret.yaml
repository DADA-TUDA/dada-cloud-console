{{- if and .Values.gitopsAgent.enabled (not .Values.gitopsAgent.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dada-cloud-console.fullname" . }}-gitops-agent
  labels:
    {{- include "dada-cloud-console.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $key, $value := .Values.gitopsAgent.secret }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
{{- end }}
