global:
  imageRegistry: nexus.dada-tuda.ru/dada
  imagePullSecrets:
    - name: nexus-cred
  labels:
    app.kubernetes.io/part-of: dada-cloud

backend:
  enabled: true
  replicaCount: 1
  image:
    repository: dada-cloud-console-backend
    tag: "c4ca3227"
    pullPolicy: IfNotPresent
  service:
    port: 8080
  env:
    APP_ENV: production
    HTTP_PORT: "8080"
    GIT_STATE_REPO_URL: "https://github.com/DADA-TUDA/dada-cloud-console.git"
    GIT_STATE_REPO_BRANCH: "gitops-state"
    GIT_STATE_REPO_LOCAL_PATH: "/var/lib/dada-state"
    GIT_AUTHOR_NAME: "DADA Platform Bot"
    GIT_AUTHOR_EMAIL: "platform-bot@dada-tuda.ru"
    ARGO_CLUSTER_NAME: "beget-prod"
  # Secret already provisioned manually in the cluster — do not regenerate
  existingSecret: "dada-cloud-console-backend"
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: "longhorn-prod"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: dada-cloud-console-frontend
    tag: "c4ca3227"
    pullPolicy: IfNotPresent
  service:
    port: 3000
  env:
    NODE_ENV: production
    NEXT_PUBLIC_API_BASE_URL: "https://console.dada-tuda.ru/api"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: console.dada-tuda.ru
  tls:
    enabled: true
    secretName: dada-cloud-console-tls

rbac:
  create: true
  extraRules: []

migrationJob:
  enabled: false
  image:
    repository: dada-cloud-console-backend
    tag: "c4ca3227"
  command: ["./migrate"]
