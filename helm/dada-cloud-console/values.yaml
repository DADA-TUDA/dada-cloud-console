global:
  imageRegistry: ghcr.io/dada-tuda
  imagePullSecrets:
    - name: github-container-registry
  labels:
    app.kubernetes.io/part-of: dada-cloud
  # Default storage class for persistent volumes (can be overridden per-component)
  # Use "local-path" for local development or set to your cluster's default
  storageClassName: "local-path"

backend:
  enabled: true
  replicaCount: 1
  image:
    repository: dada-cloud-console-backend
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    port: 8080
  env:
    APP_ENV: production
    HTTP_PORT: "8080"
    ARGO_CLUSTER_NAME: ""
  existingSecret: ""
  secret:
    DATABASE_URL: "postgres://dada:change-me@postgresql:5432/dada_console?sslmode=disable"
    JWT_SECRET: "change-me"
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

gitopsAgent:
  enabled: true
  image:
    repository: dada-cloud-console-gitops-agent
    tag: "latest"
    pullPolicy: IfNotPresent
  # webhookPort: when set, exposes a /webhook/github endpoint for push events
  webhookPort: 8090
  env:
    GITOPS_DEFAULT_BRANCH: "main"
    GITOPS_BOT_NAME: "DADA Platform Bot"
    GITOPS_BOT_EMAIL: "bot@dada-tuda.ru"
    GITOPS_POLL_INTERVAL_DB: "3s"
    GITOPS_POLL_INTERVAL_GIT: "30s"
    CLUSTER_LB_IP: "93.189.231.60"
  existingSecret: ""
  secret:
    DATABASE_URL: "postgres://dada:change-me@postgresql:5432/dada_console?sslmode=disable"
    GITOPS_DEFAULT_REPO_URL: "https://github.com/DADA-TUDA/argo-infra.git"
    GITOPS_DEFAULT_USERNAME: "platform-bot"
    GITOPS_DEFAULT_TOKEN: "change-me"
    GITOPS_ENCRYPTION_KEY: "change-me-32-byte-hex-encoded-key"
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: dada-cloud-console-frontend
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    port: 3000
  env:
    NODE_ENV: production
    NEXT_PUBLIC_API_BASE_URL: "/api"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: console.example.com
  tls:
    enabled: true
    secretName: dada-cloud-console-tls

rbac:
  create: true
  extraRules: []

migrationJob:
  enabled: false
  image:
    repository: dada-cloud-console-backend
    tag: "latest"
  command: ["./migrate"]
