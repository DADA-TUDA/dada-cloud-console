global:
  imageRegistry: nexus.example.com/dada
  imagePullSecrets: []
  labels:
    app.kubernetes.io/part-of: dada-cloud

backend:
  enabled: true
  replicaCount: 1
  image:
    repository: dada-cloud-console-backend
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    port: 8080
  env:
    APP_ENV: production
    HTTP_PORT: "8080"
    GIT_STATE_REPO_URL: "https://github.com/your-org/dada-state-repo.git"
    GIT_STATE_REPO_BRANCH: "main"
    GIT_STATE_REPO_LOCAL_PATH: "/var/lib/dada-state"
    GIT_AUTHOR_NAME: "DADA Platform Bot"
    GIT_AUTHOR_EMAIL: "platform-bot@dada-tuda.ru"
    ARGO_CLUSTER_NAME: "beget-prod"
  existingSecret: ""
  secret:
    DATABASE_URL: "postgres://dada:change-me@postgresql.databases.svc.cluster.local:5432/dada_console?sslmode=disable"
    JWT_SECRET: "change-me"
    GIT_USERNAME: "platform-bot"
    GIT_TOKEN: "change-me"
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: dada-cloud-console-frontend
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    port: 3000
  env:
    NODE_ENV: production
    NEXT_PUBLIC_API_BASE_URL: "/api"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: console.dada-tuda.ru
  tls:
    enabled: true
    secretName: dada-cloud-console-tls

rbac:
  create: true
  # Backend should only read status from cluster. Writes go to Git.
  extraRules: []

migrationJob:
  enabled: false
  image:
    repository: dada-cloud-console-backend
    tag: "latest"
  command: ["./migrate"]
